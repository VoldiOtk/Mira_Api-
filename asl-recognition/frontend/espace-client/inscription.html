<!DOCTYPE html>
<!--[if IE 8 ]><html class="ie" xmlns="http://www.w3.org/1999/xhtml" xml:lang="fr-FR" lang="fr-FR"> <![endif]-->
<!--[if (gte IE 9)|!(IE)]><!-->
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="fr-FR" lang="fr-FR"><!--<![endif]-->
	<head>
		<meta charset="UTF-8">
		<!--[if IE]><meta http-equiv='X-UA-Compatible' content='IE=edge,chrome=1'><![endif]-->
		<title>Mira — Espace client | Inscription</title>
		<meta name="author" content="GV TECH">
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
		<link rel="stylesheet" type="text/css" href="stylesheets/bootstrap4-alpha3.min.css">
		<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
		<link rel="stylesheet" type="text/css" href="stylesheets/style.css">
		<link rel="stylesheet" type="text/css" href="stylesheets/responsive.css">
		<link href="images/icon/favicon.png" rel="shortcut icon">
		<style>
			body { background-color:#18191c; }
			.mira-auth-wrap { min-height: 100vh; display:flex; align-items:center; justify-content:center; padding: 40px 20px; }
			.mira-auth-card { width: 100%; max-width: 440px; background-color:#1d1f23; border:1px solid #232427; border-radius:12px; padding: 38px 34px; box-shadow: 0 18px 50px rgba(0,0,0,.45); }
			.mira-auth-logo { text-align:center; margin-bottom: 8px; }
			.mira-auth-logo .brand { font-family:'Oswald'; font-size:34px; font-weight:500; color:#fff; letter-spacing:1px; }
			.mira-auth-logo .sub { display:block; font-size:11px; color:#04aec6; letter-spacing:2px; margin-top:-4px; }
			.mira-auth-title { text-align:center; color:#f0f0f0; font-family:'Oswald'; font-size:18px; letter-spacing:.5px; margin: 22px 0 4px; }
			.mira-auth-lead { text-align:center; color:#898989; font-size:13px; margin-bottom: 26px; }
			.mira-form label { display:block; color:#c5c5c5; font-family:'Oswald'; font-size:13px; letter-spacing:.5px; margin-bottom:8px; }
			.mira-form .form-row { margin-bottom:18px; }
			.mira-form input[type="text"], .mira-form input[type="email"], .mira-form input[type="password"] {
				width:100%; background-color:#242629; border:1px solid #2c2e33; border-radius:6px; padding:12px 15px; color:#e0e0e0; }
			.mira-form input:focus { outline:none; border-color:#04aec6; }
			.mira-btn { display:inline-block; width:100%; text-align:center; background-color:#04aec6; color:#fff; border:none; border-radius:25px; padding:12px 28px; font-family:'Oswald'; font-size:14px; letter-spacing:.5px; cursor:pointer; }
			.mira-btn:hover { color:#fff; background-color:#4c418b; }
			.mira-btn[disabled] { opacity:.6; cursor:default; }
			.mira-auth-foot { text-align:center; color:#898989; font-size:13px; margin-top:22px; }
			.mira-auth-foot a { color:#04aec6; }
			.mira-field-error { color:#ff2d78; font-size:12px; margin-top:6px; min-height:14px; }
			.mira-hint { color:#6f6f6f; font-size:11px; margin-top:6px; }
			.mira-alert { border-radius:8px; padding:12px 14px; font-size:13px; margin-bottom:20px; display:none; }
			.mira-alert.err { background-color:rgba(255,45,120,.12); border:1px solid rgba(255,45,120,.35); color:#ff8db5; }
			.mira-alert.ok { background-color:rgba(4,174,198,.12); border:1px solid rgba(4,174,198,.35); color:#7fe3ef; }
			.mira-spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:mira-spin .7s linear infinite; vertical-align:middle; margin-right:8px; }
			@keyframes mira-spin { to { transform:rotate(360deg); } }
			.mira-copyright { text-align:center; color:#5c5c5c; font-size:11px; font-family:'Oswald'; font-weight:300; margin-top:26px; letter-spacing:.5px; }
		</style>
	</head>
	<body data-page="auth">
		<div class="mira-auth-wrap">
			<div class="mira-auth-card">
				<div class="mira-auth-logo">
					<a href="connexion.html" title="Mira — Espace client" style="text-decoration:none;">
						<span class="brand">Mira</span>
						<span class="sub">ESPACE CLIENT</span>
					</a>
				</div>
				<h1 class="mira-auth-title">Créer un compte</h1>
				<p class="mira-auth-lead">Démarrez avec l'API de reconnaissance Mira.</p>

				<div id="auth-alert" class="mira-alert err" role="alert"></div>

				<form id="register-form" class="mira-form" action="#" method="post" accept-charset="utf-8" novalidate>
					<div class="form-row">
						<label for="name">Nom complet</label>
						<input type="text" id="name" name="name" autocomplete="name" placeholder="Votre nom">
						<div class="mira-field-error" id="name-error"></div>
					</div>
					<div class="form-row">
						<label for="email">Adresse e-mail</label>
						<input type="email" id="email" name="email" autocomplete="email" placeholder="vous@exemple.com">
						<div class="mira-field-error" id="email-error"></div>
					</div>
					<div class="form-row">
						<label for="password">Mot de passe</label>
						<input type="password" id="password" name="password" autocomplete="new-password" placeholder="Au moins 8 caractères">
						<div class="mira-field-error" id="password-error"></div>
					</div>
					<div class="form-row">
						<label for="confirm">Confirmer le mot de passe</label>
						<input type="password" id="confirm" name="confirm" autocomplete="new-password" placeholder="Retapez le mot de passe">
						<div class="mira-field-error" id="confirm-error"></div>
					</div>
					<button type="submit" id="submit-btn" class="mira-btn">Créer mon compte</button>
				</form>

				<p class="mira-auth-foot">Vous avez déjà un compte ? <a href="connexion.html">Se connecter</a></p>
				<p class="mira-copyright">2026 © Mira — édité par GV TECH · <a href="https://voldimbayo.com" target="_blank" rel="noopener" style="color:inherit;">voldimbayo.com</a></p>
			</div>
		</div>

		<script src="js/mira-client.js"></script>
		<script src="javascript/mira-api.js"></script>
		<script>
			(function () {
				"use strict";
				if (window.MiraAPI && MiraAPI.isAuthenticated()) {
					window.location.replace("accueil.html");
					return;
				}

				var form = document.getElementById("register-form");
				var nameEl = document.getElementById("name");
				var emailEl = document.getElementById("email");
				var pwdEl = document.getElementById("password");
				var confEl = document.getElementById("confirm");
				var nameErr = document.getElementById("name-error");
				var emailErr = document.getElementById("email-error");
				var pwdErr = document.getElementById("password-error");
				var confErr = document.getElementById("confirm-error");
				var alertBox = document.getElementById("auth-alert");
				var btn = document.getElementById("submit-btn");

				function showAlert(msg, kind) {
					alertBox.className = "mira-alert " + (kind || "err");
					alertBox.textContent = msg;
					alertBox.style.display = "block";
				}
				function clearAlert() { alertBox.style.display = "none"; alertBox.textContent = ""; }
				function setBusy(busy, label) {
					btn.disabled = busy;
					btn.innerHTML = busy ? '<span class="mira-spinner"></span>' + (label || "Création…") : "Créer mon compte";
				}
				function isEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

				function validate() {
					var ok = true;
					nameErr.textContent = ""; emailErr.textContent = ""; pwdErr.textContent = ""; confErr.textContent = "";
					var name = nameEl.value.trim();
					var email = emailEl.value.trim();
					if (!name) { nameErr.textContent = "Le nom est requis."; ok = false; }
					if (!email) { emailErr.textContent = "L'adresse e-mail est requise."; ok = false; }
					else if (!isEmail(email)) { emailErr.textContent = "Adresse e-mail invalide."; ok = false; }
					if (!pwdEl.value) { pwdErr.textContent = "Le mot de passe est requis."; ok = false; }
					else if (pwdEl.value.length < 8) { pwdErr.textContent = "Au moins 8 caractères."; ok = false; }
					if (!confEl.value) { confErr.textContent = "Confirmez le mot de passe."; ok = false; }
					else if (confEl.value !== pwdEl.value) { confErr.textContent = "Les mots de passe ne correspondent pas."; ok = false; }
					return ok;
				}

				function errToText(err) {
					if (!err) return "Inscription impossible. Réessayez.";
					if (typeof err === "string") return err;
					if (Array.isArray(err)) return err.map(function (e) { return e && e.msg ? e.msg : String(e); }).join(" ");
					if (err.msg) return err.msg;
					return "Inscription impossible. Réessayez.";
				}

				form.addEventListener("submit", function (e) {
					e.preventDefault();
					clearAlert();
					if (!window.MiraAPI) { showAlert("Service indisponible (mira-api.js non chargé)."); return; }
					if (!validate()) return;
					setBusy(true);
					// register() pose déjà le token en cas de succès → connexion automatique.
					MiraAPI.register(nameEl.value.trim(), emailEl.value.trim(), pwdEl.value).then(function (res) {
						if (res.ok && MiraAPI.isAuthenticated()) {
							showAlert("Compte créé. Redirection…", "ok");
							window.location.replace("accueil.html");
							return;
						}
						if (res.ok) {
							// Compte créé mais pas de token renvoyé : on enchaîne avec un login.
							setBusy(true, "Connexion…");
							MiraAPI.login(emailEl.value.trim(), pwdEl.value).then(function (lr) {
								if (lr.ok) { window.location.replace("accueil.html"); }
								else { setBusy(false); showAlert("Compte créé. Connectez-vous pour continuer.", "ok"); }
							});
							return;
						}
						setBusy(false);
						if (res.status === 409) showAlert("Un compte existe déjà avec cette adresse e-mail.");
						else showAlert(errToText(res.error));
					});
				});
			})();
		</script>
	</body>
</html>
